<head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<nav class="nav" id="nav">
  <a href="index.html" class="brand">
    <div class="brand-name"><b>TrueAlly</b> <i>Solutions</i></div>
  </a>
  <div class="nav-links">
    <a href="index.html#problem">The Problem</a>
    <a href="Services.html" style="color: var(--ink); font-weight: 600;">Services</a>
    <a href="index.html#how">How It Works</a>
    <a href="index.html#why">Why TrueAlly</a>
  </div>
  <a href="#contact" class="nav-cta"><span class="dot"></span>Book a Call</a>
  <button class="hamburger" aria-label="menu"><span></span></button>
</nav>

<main id="root"></main>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="sections-bottom.jsx"></script>
<script type="text/babel" src="services-page.jsx"></script>

<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<ServicesApp />);

const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  if (window.scrollY > 20) nav.classList.add('scrolled');
  else nav.classList.remove('scrolled');
}, { passive: true });

const hamburger = document.querySelector('.hamburger');
hamburger.addEventListener('click', () => nav.classList.toggle('open'));
document.querySelectorAll('.nav-links a').forEach((a) => {
  a.addEventListener('click', () => nav.classList.remove('open'));
});

if (window.location.hash) {
  let tries = 0;
  const scrollToHash = () => {
    const el = document.querySelector(window.location.hash);
    if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' });
    else if (tries++ < 40) setTimeout(scrollToHash, 100);
  };
  setTimeout(scrollToHash, 100);
}

const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((e) => {
    if (e.isIntersecting) {
      e.target.classList.add('in');
      revealObserver.unobserve(e.target);
    }
  });
}, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });

const wireReveals = () => {
  document.querySelectorAll('.reveal:not(.in)').forEach((el) => revealObserver.observe(el));
};
setTimeout(wireReveals, 100);
setTimeout(wireReveals, 400);
setTimeout(wireReveals, 1000);
new MutationObserver(() => wireReveals()).observe(document.body, { childList: true, subtree: true });
</script>

</body>
</html>
